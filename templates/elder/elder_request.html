
{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THAMAR - Request Help</title>
    <link rel="stylesheet" href="{%static 'thamar/css/elder/elder_request.css'%}?v=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="icon" type="image/png" href="{% static 'thamar/images/titlelogo.png' %}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body style="background-color: #2a2540;">
  {%include 'partials/navbar.html'%}
<div class="request-wrapper">

    <div class="request-card">
        <div class="left-panel">

            <a href="{%url 'core:home'%}" class="back-btn">← Back to Home Page</a>

            <div class="slideshow">

                <div class="slide active">
                    <img src="{%static 'thamar/images/requestimg1.png'%}">
                </div>

                <div class="slide">
                    <img src="{%static 'thamar/images/requestimg2.png'%}">
                </div>

                <div class="slide">
                    <img src="{%static 'thamar/images/requestimg3.png'%}">
                </div>

                <div class="indicators">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>

            </div>

        </div>
        <div class="right-panel">

            <div class="form-container">

                <h2>Request Assistance</h2>
                <p class="sub-text">Provide details for assessment</p>

                <form>
                    <div class="form-group">
                        <label>Purpose of Request</label>
                        <select name="purpose" required>
                            <option value="">Select purpose</option>
                            <option>Medical Assistance</option>
                            <option>Emergency Help</option>
                            <option>Daily Living Support</option>
                            <option>Mobility Support</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Describe your situation</label>
                        <textarea name="purpose_description"
                                  rows="3"
                                  placeholder="Explain briefly..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Chronic Disease</label>
                        <select name="chronic_disease" required>
                            <option value="">Select</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Mobility Issue</label>
                        <select name="mobility_issue" required>
                            <option value="">Select</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Recent Fall</label>
                        <select name="recent_fall" required>
                            <option value="">Select</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Emergency Visits (last 6 months)</label>
                        <input type="number"
                               name="emergency_visits"
                               min="0"
                               max="20"
                               required>
                    </div>

                    <button type="submit" class="submit-btn">
                        Assess Risk
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
let slides = document.querySelectorAll(".slide");
let dots = document.querySelectorAll(".dot");
let current = 0;
function showSlide(index) {
    slides.forEach(s => s.classList.remove("active"));
    dots.forEach(d => d.classList.remove("active"));
    slides[index].classList.add("active");
    dots[index].classList.add("active");
}
function nextSlide() {
    current++;
    if (current >= slides.length) current = 0;
    showSlide(current);
}
setInterval(nextSlide, 4000);
</script>
</body>
</html>
